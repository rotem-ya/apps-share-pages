  <style>

    *{box-sizing:border-box} body{margin:0;font-family:Arial,"Noto Sans Hebrew",sans-serif;color:var(--text);background:radial-gradient(circle at top right,#ffe3a6 0,transparent 28%),radial-gradient(circle at top left,#d9ecff 0,transparent 30%),linear-gradient(180deg,var(--bg1),var(--bg2));min-height:100vh;display:grid;place-items:center;padding:20px}
