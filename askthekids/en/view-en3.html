    <style>
        :root {
            --primary-gold: #FFB300;
            --primary-gold-dark: #FF9800;
            --text-main: #001A4D;
            --bg-body: #F9FAFB;
            --bg-card: #FFFFFF;
            --btn-android: #01875F;
            --btn-android-hover: #016E4D;
            --btn-apple: #1C1C1E;
            --btn-apple-hover: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .hero-banner {
            width: 100%;
            height: 180px;
            background-color: var(--primary-gold);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .main-content {
            flex: 1;
            background: var(--bg-card);
            border-radius: 32px 32px 0 0;
            margin-top: -40px;
            padding: 20px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .title-block {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
            justify-content: center;
        }

        .app-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background-color: #FFF;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            border: 3px solid var(--bg-card);
            object-fit: cover;
            flex-shrink: 0;
        }

        .title-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            line-height: 1.2;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-gold-dark);
            margin-top: 2px;
        }

        .description {
            font-size: 14px;
            line-height: 1.3;
            color: #556;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .features-grid {
            display: flex;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-bottom: 24px;
        }

        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: linear-gradient(135deg, #FFF9E6 0%, #FFF0C2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 6px;
            box-shadow: 0 4px 12px rgba(255, 179, 0, 0.15);
        }

        .feature-icon svg {
            width: 22px;
            height: 22px;
            fill: var(--primary-gold-dark);
        }

        .feature-text {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
        }

        .download-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .store-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 13px 18px;
            border-radius: 18px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
        }

        .store-btn:active {
            transform: scale(0.97);
        }

        .btn-google {
            background: linear-gradient(135deg, var(--btn-android) 0%, var(--btn-android-hover) 100%);
        }

        .btn-apple {
            background: linear-gradient(135deg, var(--btn-apple) 0%, var(--btn-apple-hover) 100%);
        }

        .btn-icon {
            width: 26px;
            height: 26px;
            fill: white;
            margin-right: 10px;
        }

        .btn-content {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        .btn-main-text {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.1;
        }

        footer {
            margin-top: auto;
            padding: 14px;
            text-align: center;
            font-size: 11px;
            color: #889;
            font-weight: 500;
        }
    </style>
</head>
