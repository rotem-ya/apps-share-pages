<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask The Kids English - Early Access</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #fff4e6, #ffe0b2);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .container img {
      width: 100%;
      max-width: 250px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 32px;
      color: #ff8a00;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      color: #555;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      font-size: 16px;
      color: white;
      background: #ff8a00;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #e67600;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="tiger.png" alt="Ask The Kids English">

    <h1>Sign Up for Early Access</h1>

    <p>Join now</p>

    <a class="btn" href="https://forms.gle/SS6RFPYukKnjn5Ka9" target="_blank">
      Join now
    </a>
  </div>
</body>
</html>
