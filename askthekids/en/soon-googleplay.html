<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask The Kids - Early Access</title>
  <meta name="description" content="Ask The Kids - Sign Up for Early Access" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #fff8ef 0%, #ffe9c7 100%);
      color: #2f2f2f;
      text-align: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
    }

    .hero-image {
      width: 100%;
      max-width: 300px;
      height: auto;
      margin: 0 auto 20px;
      display: block;
    }

    .logo {
      width: 92px;
      height: 92px;
      object-fit: contain;
      margin: 0 auto 18px;
      display: block;
    }

    h1 {
      font-size: 2rem;
      line-height: 1.2;
      margin-bottom: 14px;
      color: #ff8a00;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.5;
      margin-bottom: 26px;
      color: #444;
    }

    .cta-button {
      display: inline-block;
      background: #ff8a00;
      color: #fff;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 16px 30px;
      border-radius: 999px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      box-shadow: 0 10px 24px rgba(255, 138, 0, 0.28);
    }

    .cta-button:hover {
      background: #f07f00;
      transform: translateY(-1px);
    }

    .cta-button:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .card {
        padding: 26px 18px;
      }

      h1 {
        font-size: 1.7rem;
      }

      p {
        font-size: 1rem;
      }

      .cta-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <img
      class="hero-image"
      src="https://raw.githubusercontent.com/rotem-ya/apps-share-pages/main/askthekids/en/hero.png"
      alt="Ask The Kids English"
      onerror="this.style.display='none'"
    />

    <img
      class="logo"
      src="https://raw.githubusercontent.com/rotem-ya/apps-share-pages/main/askthekids/en/logo.png"
      alt="Ask The Kids logo"
      onerror="this.style.display='none'"
    />

    <h1>Sign Up for Early Access</h1>
    <p>Join now</p>

    <a
      class="cta-button"
      href="https://forms.gle/SS6RFPYukKnjn5Ka9"
      target="_blank"
      rel="noopener noreferrer"
    >
      Join now
    </a>
  </main>
</body>
</html>
