<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>מה בתמונה? - הצטרפות לחדר</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #06101d;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at 50% 8%, rgba(0, 242, 255, 0.16), transparent 30%),
        linear-gradient(180deg, #06101d 0%, #07172d 46%, #073968 78%, #00aeca 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
    }

    .shell {
      width: 100%;
      max-width: 430px;
    }

    .card {
      width: 100%;
      min-height: min(760px, calc(100svh - 36px));
      padding: 34px 22px 22px;
      text-align: center;
      border-radius: 32px;
      background: linear-gradient(180deg, rgba(19, 30, 48, 0.96), rgba(11, 20, 34, 0.97));
      border: 1.5px solid rgba(139, 162, 190, 0.30);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.48),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .camera {
      font-size: 62px;
      line-height: 1;
      margin-bottom: 18px;
      filter: drop-shadow(0 0 18px rgba(0, 242, 255, 0.12));
    }

    h1 {
      color: #d7b739;
      font-size: clamp(34px, 9vw, 44px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 12px;
      letter-spacing: -0.7px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.70);
      font-size: clamp(19px, 5vw, 25px);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 34px;
    }

    .code-label {
      color: rgba(255, 255, 255, 0.45);
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: 0.4px;
    }

    .code-box {
      width: 100%;
      min-height: 112px;
      margin-bottom: 28px;
      padding: 18px 12px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(44, 64, 84, 0.74), rgba(21, 33, 49, 0.94));
      border: 2px solid rgba(141, 213, 235, 0.45);
      box-shadow:
        0 0 26px rgba(0, 242, 255, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .code-value {
      direction: ltr;
      unicode-bidi: isolate;
      width: 100%;
      max-width: 100%;
      color: #91dcf6;
      font-size: clamp(42px, 15vw, 66px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: clamp(3px, 1.4vw, 7px);
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 0 20px rgba(145, 220, 246, 0.42);
      transform: translateX(-0.02em);
    }

    .button {
      width: 100%;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 14px;
      padding: 16px 20px;
      border-radius: 22px;
      font-family: inherit;
      font-size: clamp(20px, 5.6vw, 26px);
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      text-decoration: none;
      border: 0;
      transition: transform 0.10s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .button:active {
      transform: scale(0.98);
      opacity: 0.80;
    }

    .button-open {
      color: #07101f;
      background: linear-gradient(180deg, #fff176 0%, #ffe15a 50%, #cfa817 100%);
      box-shadow: 0 12px 26px rgba(255, 218, 67, 0.30);
    }

    .button-copy {
      color: rgba(255, 255, 255, 0.92);
      background: rgba(10, 31, 52, 0.74);
      border: 1.5px solid rgba(151, 210, 239, 0.55);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .button-copy.copied {
      color: #9bf6b4;
      border-color: rgba(155, 246, 180, 0.75);
    }

    .fallback {
      margin-top: 20px;
      padding: 20px 18px;
      text-align: right;
      border-radius: 22px;
      background: rgba(7, 18, 31, 0.72);
      border: 1.5px solid rgba(141, 213, 235, 0.24);
      color: rgba(255, 255, 255, 0.74);
      font-size: clamp(15px, 4.1vw, 18px);
      line-height: 1.65;
    }

    .fallback-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.92);
      font-weight: 900;
      font-size: clamp(18px, 4.8vw, 22px);
      margin-bottom: 12px;
      text-align: center;
    }

    .steps {
      list-style: none;
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .steps li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: center;
    }

    .num {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #06101d;
      background: #91dcf6;
      font-weight: 900;
      box-shadow: 0 0 16px rgba(145, 220, 246, 0.35);
    }

    .invalid-box {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-top: 22px;
      padding: 18px;
      text-align: right;
      border-radius: 20px;
      background: rgba(8, 22, 37, 0.78);
      border: 1.5px solid rgba(255, 80, 120, 0.38);
      color: rgba(255, 255, 255, 0.82);
      font-size: clamp(17px, 4.5vw, 20px);
      line-height: 1.45;
    }

    .warn {
      color: #ff5c82;
      font-size: 34px;
      line-height: 1;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      color: rgba(255, 255, 255, 0.72);
      font-size: clamp(14px, 3.7vw, 17px);
    }

    .hidden {
      display: none !important;
    }

    @media (max-height: 690px) {
      body {
        align-items: flex-start;
        padding-top: 14px;
      }

      .card {
        min-height: auto;
        padding-top: 24px;
      }

      .camera {
        font-size: 48px;
        margin-bottom: 10px;
      }

      .subtitle {
        margin-bottom: 22px;
      }

      .code-box {
        min-height: 96px;
        margin-bottom: 20px;
      }

      .fallback {
        margin-top: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card" aria-label="הצטרפות לחדר משחק">
      <div class="camera" aria-hidden="true">📸</div>
      <h1>מה בתמונה?</h1>
      <p class="subtitle">הוזמנת להצטרף לחדר</p>

      <div id="validState" class="hidden">
        <div class="code-label">קוד החדר</div>
        <div class="code-box">
          <div id="codeDisplay" class="code-value">------</div>
        </div>

        <button id="openBtn" class="button button-open" type="button" onclick="openApp()">
          <span>פתח באפליקציה</span>
          <span aria-hidden="true">↗</span>
        </button>

        <button id="copyBtn" class="button button-copy" type="button" onclick="copyCode()">
          <span id="copyText">העתק קוד</span>
          <span id="copyIcon" aria-hidden="true">▣</span>
        </button>

        <div class="fallback">
          <div class="fallback-title">
            <span>האפליקציה לא נפתחה?</span>
            <span aria-hidden="true">ⓘ</span>
          </div>
          <ol class="steps">
            <li><span class="num">1</span><span>הורד את WhoIsThere מ-Google Play.</span></li>
            <li><span class="num">2</span><span>פתח את האפליקציה.</span></li>
            <li><span class="num">3</span><span>לחץ "הצטרף לחדר" והזן את הקוד שמופיע למעלה.</span></li>
          </ol>
        </div>
      </div>

      <div id="invalidState" class="invalid-box hidden">
        <span class="warn" aria-hidden="true">⚠</span>
        <span>לא נמצא קוד חדר בקישור.<br>בקש קישור חדש מהמארח.</span>
      </div>

      <div class="footer">WhoIsThere © 2026</div>
    </section>
  </main>

  <script>
    var roomCode = '';

    (function initJoinPage() {
      var params = new URLSearchParams(window.location.search);
      var rawCode = params.get('code') || '';
      var code = rawCode.trim().toUpperCase();

      if (!/^[A-Z0-9]{6}$/.test(code)) {
        document.getElementById('invalidState').classList.remove('hidden');
        return;
      }

      roomCode = code;
      document.getElementById('codeDisplay').textContent = code;
      document.getElementById('validState').classList.remove('hidden');
    })();

    function openApp() {
      if (!roomCode) return;
      var url = 'whoisthere://join?code=' + encodeURIComponent(roomCode);
      window.location.href = url;
    }

    function copyCode() {
      if (!roomCode) return;

      var button = document.getElementById('copyBtn');
      var icon = document.getElementById('copyIcon');
      var text = document.getElementById('copyText');

      function markCopied() {
        button.classList.add('copied');
        icon.textContent = '✓';
        text.textContent = 'הועתק';

        window.setTimeout(function resetCopyButton() {
          button.classList.remove('copied');
          icon.textContent = '▣';
          text.textContent = 'העתק קוד';
        }, 1800);
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(roomCode).then(markCopied).catch(function () {
          legacyCopy(roomCode, markCopied);
        });
      } else {
        legacyCopy(roomCode, markCopied);
      }
    }

    function legacyCopy(value, callback) {
      var textarea = document.createElement('textarea');
      textarea.value = value;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.top = '0';
      textarea.style.left = '0';
      textarea.style.opacity = '0';
      textarea.style.pointerEvents = 'none';
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();

      try {
        document.execCommand('copy');
      } catch (error) {
        // The visible code remains available if copy fails.
      }

      document.body.removeChild(textarea);
      callback();
    }
  </script>
</body>
</html>
